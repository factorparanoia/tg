version: '3.9'

services:
  # ── Midnight AI Bot ───────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: midnight-ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-midnight}:${POSTGRES_PASSWORD:-midnight_pass}@postgres:5432/${POSTGRES_DB:-midnight_ai}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - midnight-net
    volumes:
      - uploads:/app/uploads

  # ── Development mode (hot reload) ─────────
  bot-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: midnight-ai-dev
    restart: unless-stopped
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-midnight}:${POSTGRES_PASSWORD:-midnight_pass}@postgres:5432/${POSTGRES_DB:-midnight_ai}
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    ports:
      - "3000:3000"
      - "9229:9229"    # Node debugger
    networks:
      - midnight-net
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - uploads:/app/uploads

  # ── PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: midnight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-midnight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-midnight_pass}
      POSTGRES_DB: ${POSTGRES_DB:-midnight_ai}
    ports:
      - "5432:5432"
    networks:
      - midnight-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-midnight} -d ${POSTGRES_DB:-midnight_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: midnight-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - midnight-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Prisma Studio (dev only) ───────────────
  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: midnight-prisma-studio
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-midnight}:${POSTGRES_PASSWORD:-midnight_pass}@postgres:5432/${POSTGRES_DB:-midnight_ai}
    command: ["npx", "prisma", "studio", "--port", "5555", "--browser", "none"]
    ports:
      - "5555:5555"
    networks:
      - midnight-net

networks:
  midnight-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  uploads:
